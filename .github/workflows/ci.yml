# CI: lint and test on push and PRs.
# Add deploy jobs later (e.g. after Guide 4) when we have Terraform and a target.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        working-directory: backend
        run: uv sync --all-extras

      - name: Ruff (lint)
        working-directory: backend
        run: uv run ruff check .

      - name: Ruff (format check)
        working-directory: backend
        run: uv run ruff format --check .

      - name: Pytest
        working-directory: backend
        run: uv run pytest -v
